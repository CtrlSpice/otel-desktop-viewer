# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on: push

jobs:

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            env:
              NO_WINDOWS_SERVICE: 0


    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 1.23

    # Add these steps for Windows
    - name: Set up MinGW
      if: matrix.os == 'windows-latest'
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x64

    # Download and setup DuckDB for Windows
    - name: Setup DuckDB (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        choco install duckdb
        # Add MinGW to PATH
        echo "C:\ProgramData\mingw64\mingw64\bin" >> $env:GITHUB_PATH
        # Set environment variables for CGO
        echo "CGO_ENABLED=1" >> $env:GITHUB_ENV

    # Build step
    - name: Build
      run: |
        cd desktopcollector
        go build -o ../otel-desktop-viewer
      env:
        CGO_ENABLED: 1

    - name: Exporter Go Tests
      run: cd desktopexporter; go test ./...

    # - name: Integration
