# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on: push

jobs:

  build:
    runs-on: ubuntu-latest
    # strategy:
    #   matrix:
    #     os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: true

    - name: Install MinGW-w64
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-mingw-w64-x86-64

    - name: Download DuckDB
      run: |
        # Get the Windows library
        curl -L -o libduckdb.zip https://github.com/duckdb/duckdb/releases/download/v0.10.0/libduckdb-windows-amd64.zip
        unzip libduckdb.zip -d duckdb
        
        # Get the full source for headers
        git clone --depth 1 --branch v0.10.0 https://github.com/duckdb/duckdb.git duckdb-src
        
        # Set up headers
        mkdir -p duckdb/include
        cp duckdb-src/src/include/duckdb.h duckdb/include/
        cp duckdb-src/src/include/duckdb.hpp duckdb/include/
        cp duckdb-src/src/include/duckdb/*.h* duckdb/include/duckdb/
        
        ls -la duckdb
        ls -la duckdb/include
        ls -la duckdb/include/duckdb

    - name: Build
      run: |
        cd desktopcollector
        GOOS=windows GOARCH=amd64 CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc \
        CGO_LDFLAGS="-L$(pwd)/../duckdb -lduckdb_static" \
        CGO_CFLAGS="-I$(pwd)/../duckdb/include" \
        go build -v -tags=duckdb_use_lib -o ../otel-desktop-viewer.exe

    - name: Exporter Go Tests
      run: |
        cd desktopexporter
        GOOS=windows GOARCH=amd64 CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc \
        CGO_LDFLAGS="-L$(pwd)/../duckdb -lduckdb_static" \
        CGO_CFLAGS="-I$(pwd)/../duckdb/include" \
        go test ./...

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: otel-desktop-viewer
        path: otel-desktop-viewer.exe

    # - name: Integration
    #   run: ./.github/workflows/integration.sh
    #   shell: bash
