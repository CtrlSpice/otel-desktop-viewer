# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on: push

jobs:

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # os: [ubuntu-latest, macos-latest, windows-latest]
        os: [windows-latest]
        include:
          - os: windows-latest
            env:
              NO_WINDOWS_SERVICE: 0
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

    - name: Set up MinGW
      uses: msys2/setup-msys2@v2
      with:
        msystem: mingw64
        update: true
        install: mingw-w64-x86_64-gcc

    # Download and setup DuckDB for Windows
    - name: Setup DuckDB (Windows)
      shell: cmd
      run: |
        curl -L -o duckdb.zip https://github.com/duckdb/duckdb/releases/download/v0.9.2/libduckdb-windows-amd64.zip
        unzip duckdb.zip
        copy duckdb.dll "C:\msys64\mingw64\bin\duckdb.dll"
        copy duckdb.lib "C:\msys64\mingw64\lib\libduckdb.a"
        copy duckdb.h "C:\msys64\mingw64\include\duckdb.h"
        set CGO_ENABLED=1
        set CGO_LDFLAGS=-L C:\msys64\mingw64\lib -lduckdb
        set CGO_CFLAGS=-I C:\msys64\mingw64\include

    # Build step
    - name: Build
      run: |
        cd desktopcollector
        go build -v -o ..\otel-desktop-viewer
      env:
        CGO_ENABLED: 1
        CGO_LDFLAGS: -L C:\msys64\mingw64\lib -lduckdb
        CGO_CFLAGS: -I C:\msys64\mingw64\include

    - name: Exporter Go Tests
      run: cd desktopexporter; go test ./...

    # - name: Integration
    #   run: ./.github/workflows/integration.sh
    #   shell: bash
