
name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
permissions:
  contents: write
  id-token: write
  packages: write
  actions: write
jobs:
  build-frontend:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktopexporter/internal/frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: desktopexporter/internal/frontend
      - name: Build embedded frontend
        run: make build-ts
      - name: Upload embedded frontend
        uses: actions/upload-artifact@v7
        with:
          name: embedded-frontend
          path: desktopexporter/internal/server/static/
          retention-days: 1

  prepare:
    needs: build-frontend
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_id: macos_amd64
            goos: darwin
            goarch: amd64
          - os: macos-latest
            build_id: macos_arm64
            goos: darwin
            goarch: arm64
          - os: ubuntu-24.04
            build_id: linux_amd64
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            build_id: linux_arm64
            goos: linux
            goarch: arm64
          - os: windows-latest
            build_id: windows_amd64
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download embedded frontend
        uses: actions/download-artifact@v7
        with:
          name: embedded-frontend
          path: desktopexporter/internal/server/static/
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Tidy Go module
        run: go mod tidy
      - name: Set up MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-toolchain
      - name: Add MSYS2 to PATH (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "C:\msys64\ucrt64\bin" >> $env:GITHUB_PATH
      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          version: v2.16.0
          # Use GGOOS/GGOARCH to filter targets with partial.by: target
          args: release --clean --split ${{ github.event_name == 'workflow_dispatch' && '--snapshot' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          CGO_ENABLED: 1
          GGOOS: ${{ matrix.goos }}
          GGOARCH: ${{ matrix.goarch }}
          PRERELEASE_PUBLISH: ${{ vars.PRERELEASE_PUBLISH }}
          FURY_ACCOUNT: ${{ vars.FURY_ACCOUNT }}
          FURY_TOKEN: ${{ secrets.FURY_TOKEN }}
          MACOS_SIGN_P12: ${{ matrix.goos == 'darwin' && secrets.MACOS_SIGN_P12 || '' }}
          MACOS_SIGN_PASSWORD: ${{ matrix.goos == 'darwin' && secrets.MACOS_SIGN_PASSWORD || '' }}
          MACOS_NOTARY_KEY: ${{ matrix.goos == 'darwin' && secrets.MACOS_NOTARY_KEY || '' }}
          MACOS_NOTARY_KEY_ID: ${{ matrix.goos == 'darwin' && secrets.MACOS_NOTARY_KEY_ID || '' }}
          MACOS_NOTARY_ISSUER_ID: ${{ matrix.goos == 'darwin' && secrets.MACOS_NOTARY_ISSUER_ID || '' }}
      - name: Verify GoReleaser partial artifact
        shell: bash
        run: |
          set -euo pipefail
          dir="dist/${{ matrix.goos }}_${{ matrix.goarch }}"
          if [[ ! -d "$dir" ]] || [[ -z "$(find "$dir" -type f | head -1)" ]]; then
            echo "::error::GoReleaser did not produce partial artifacts in $dir"
            find dist -type f 2>/dev/null || true
            exit 1
          fi
          echo "Partial artifacts ready in $dir:"
          find "$dir" -type f | head -20
      - name: Cache GoReleaser contexts
        uses: actions/cache@v5
        with:
          path: dist/${{ matrix.goos }}_${{ matrix.goarch }}
          key: ${{ matrix.goos }}-${{ matrix.goarch }}-${{ github.sha }}
          enableCrossOsArchive: ${{ matrix.os == 'windows-latest' }}



  release:
    needs: prepare
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Restore GoReleaser build artifacts (darwin-amd64)
        uses: actions/cache@v5
        with:
          path: dist/darwin_amd64
          key: darwin-amd64-${{ github.sha }}
      - name: Restore GoReleaser build artifacts (darwin-arm64)
        uses: actions/cache@v5
        with:
          path: dist/darwin_arm64
          key: darwin-arm64-${{ github.sha }}
      - name: Restore GoReleaser build artifacts (linux-amd64)
        uses: actions/cache@v5
        with:
          path: dist/linux_amd64
          key: linux-amd64-${{ github.sha }}
      - name: Restore GoReleaser build artifacts (linux-arm64)
        uses: actions/cache@v5
        with:
          path: dist/linux_arm64
          key: linux-arm64-${{ github.sha }}
      - name: Restore GoReleaser build artifacts (windows-amd64)
        uses: actions/cache@v5
        with:
          path: dist/windows_amd64
          key: windows-amd64-${{ github.sha }}
          enableCrossOsArchive: true
      - name: Verify restored GoReleaser partial artifacts
        shell: bash
        run: |
          set -euo pipefail
          targets=(
            darwin_amd64
            darwin_arm64
            linux_amd64
            linux_arm64
            windows_amd64
          )
          missing=()
          for target in "${targets[@]}"; do
            dir="dist/${target}"
            if [[ ! -d "$dir" ]] || [[ -z "$(find "$dir" -type f 2>/dev/null | head -1)" ]]; then
              missing+=("$target")
            fi
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing or empty GoReleaser partial artifacts (cache miss?): ${missing[*]}"
            find dist -type f 2>/dev/null || true
            exit 1
          fi
          echo "All partial artifacts restored:"
          find dist -type f | head -50
      - name: Generate release app token
        id: release-app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            otel-desktop-viewer
            homebrew-otel-desktop-viewer
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Complete release
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          version: v2.16.0
          args: continue --merge
        env:
          GITHUB_TOKEN: ${{ steps.release-app-token.outputs.token }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          # Set repo variable PRERELEASE_PUBLISH=true to push alpha/beta/rc to Homebrew, GHCR, and GemFury.
          PRERELEASE_PUBLISH: ${{ vars.PRERELEASE_PUBLISH }}
          FURY_ACCOUNT: ${{ vars.FURY_ACCOUNT }}
          FURY_TOKEN: ${{ secrets.FURY_TOKEN }}
