name: Bug Report
description: Something isn't working as expected.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report! The more detail you provide, the faster we can help.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: checkboxes
    id: signal
    attributes:
      label: Signal type affected
      options:
        - label: Traces
        - label: Metrics
        - label: Logs
        - label: UI / frontend
        - label: Not sure

  - type: input
    id: version
    attributes:
      label: axolot(e)l version
      placeholder: e.g. v0.5.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 15.4, Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: instrumentation
    attributes:
      label: How are you sending telemetry?
      placeholder: e.g. OTel Go SDK, OpenTelemetry Collector, bargeboard, etc.

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Copy and paste any relevant logs. This will be automatically formatted into code.
      render: shell

  - type: textarea
    id: anything-else
    attributes:
      label: Anything else?
      description: Screenshots, config snippets, or anything else that might help.

  - type: checkboxes
    id: coc
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../blob/main/CODE_OF_CONDUCT.md).
          required: true
