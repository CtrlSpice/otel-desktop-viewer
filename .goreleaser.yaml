version: 2

partial:
  by: target

env:
  - CGO_ENABLED=1

before:
  hooks:
    - cmd: go mod tidy

builds:
  - id: macos_amd64
    binary: otel-desktop-viewer
    goos: 
      - darwin
    goarch:
      - amd64
    # Sets binary timestamp to commit time for reproducible builds
    mod_timestamp: "{{ .CommitTimestamp }}"
    # Removes file paths from binary for security and portability
    flags:
      - -trimpath
    # -s -w: strips debug info
    # -X: injects version, commit, and date into binary
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{ .CommitDate }}

  - id: macos_arm64
    binary: otel-desktop-viewer
    goos: 
      - darwin
    goarch:
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{ .CommitDate }}

  - id: linux_amd64
    binary: otel-desktop-viewer
    goos:
      - linux
    goarch:
      - amd64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{ .CommitDate }}

  - id: linux_arm64
    binary: otel-desktop-viewer
    goos:
      - linux
    goarch:
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{ .CommitDate }}

  - id: windows_amd64
    binary: otel-desktop-viewer
    goos:
      - windows
    goarch:
      - amd64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{ .CommitDate }}

archives:
  # Main archive with all platforms
  - id: otel-desktop-viewer-archive
    ids:
      - macos_amd64
      - macos_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
    formats: 
      - tar.gz
    format_overrides:
      - goos: windows
        formats: ['zip']
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
  
  # Separate archive for Homebrew (macOS and Linux)
  - id: homebrew-archive
    ids:
      - macos_amd64
      - macos_arm64
      - linux_amd64
      - linux_arm64
    formats: 
      - tar.gz
    name_template: "{{ .ProjectName }}_homebrew_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

nfpms:
  - id: otel-desktop-viewer
    package_name: otel-desktop-viewer
    ids:
      - linux_amd64
      - linux_arm64
    formats:
      - deb
      - rpm
    vendor: CtrlSpice
    homepage: "https://github.com/CtrlSpice/otel-desktop-viewer"
    description: "CLI tool for receiving OpenTelemetry traces, metrics, and logs on your local machine."
    license: Apache-2.0
    bindir: /usr/bin
    section: utils
    priority: optional
    overrides:
      deb:
        dependencies:
          - libstdc++6
          - ca-certificates
      rpm:
        dependencies:
          - libstdc++
          - ca-certificates

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  name_template: "v{{ .Version }}"
  footer: >-
    ---
    Released by [CtrlSpice](https://github.com/CtrlSpice) using [GoReleaser](https://github.com/goreleaser/goreleaser).

homebrew_casks:
  - name: otel-desktop-viewer
    ids:
      - homebrew-archive
    # Skip alpha/beta/rc on the public tap unless PRERELEASE_PUBLISH=true in CI.
    skip_upload: '{{ if and .Prerelease (ne .Env.PRERELEASE_PUBLISH "true") }}true{{ end }}'
    repository:
      owner: CtrlSpice
      name: homebrew-otel-desktop-viewer
    directory: Casks
    description: "otel-desktop-viewer is a CLI tool for receiving OpenTelemetry traces, metrics, and logs on your local machine."
    homepage: "https://github.com/CtrlSpice/otel-desktop-viewer"
    license: "Apache-2.0"
    caveats: |
      To start the viewer, run:
        otel-desktop-viewer

dockers:
  - id: linux_amd64
    ids:
      - linux_amd64
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.release
    use: buildx
    image_templates:
      - "ghcr.io/ctrlspice/otel-desktop-viewer:{{ .Tag }}-amd64"
      - "ghcr.io/ctrlspice/otel-desktop-viewer:latest-amd64"
    skip_push: '{{ if and .Prerelease (ne .Env.PRERELEASE_PUBLISH "true") }}true{{ end }}'
  - id: linux_arm64
    ids:
      - linux_arm64
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.release
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
    image_templates:
      - "ghcr.io/ctrlspice/otel-desktop-viewer:{{ .Tag }}-arm64"
      - "ghcr.io/ctrlspice/otel-desktop-viewer:latest-arm64"
    skip_push: '{{ if and .Prerelease (ne .Env.PRERELEASE_PUBLISH "true") }}true{{ end }}'

docker_manifests:
  - name_template: "ghcr.io/ctrlspice/otel-desktop-viewer:{{ .Tag }}"
    image_templates:
      - "ghcr.io/ctrlspice/otel-desktop-viewer:{{ .Tag }}-amd64"
      - "ghcr.io/ctrlspice/otel-desktop-viewer:{{ .Tag }}-arm64"
    skip_push: '{{ if and .Prerelease (ne .Env.PRERELEASE_PUBLISH "true") }}true{{ end }}'
  - name_template: "ghcr.io/ctrlspice/otel-desktop-viewer:latest"
    image_templates:
      - "ghcr.io/ctrlspice/otel-desktop-viewer:latest-amd64"
      - "ghcr.io/ctrlspice/otel-desktop-viewer:latest-arm64"
    skip_push: '{{ if and .Prerelease (ne .Env.PRERELEASE_PUBLISH "true") }}true{{ end }}'

gemfury:
  - account: "{{ .Env.FURY_ACCOUNT }}"
    disable: '{{ if and .Prerelease (ne .Env.PRERELEASE_PUBLISH "true") }}true{{ end }}'
    formats:
      - deb
      - rpm

